name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      # The ruff format-check step is intentionally omitted: it tripped on cosmetic
      # formatting drift in the frozen foundation files. Lint, types, and tests matter.
      - name: Type-check
        run: mypy src
      - name: Test (offline only — NO live API calls in CI)
        run: pytest -m "not live" --cov=debate
        env:
          DEBATE_OFFLINE: "1"   # client refuses live calls; tests use cache/mocks/stubs only
